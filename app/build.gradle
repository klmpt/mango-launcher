plugins {
    id 'com.android.application'
}

android {
    namespace 'com.mango.os'
    compileSdk 34

    defaultConfig {
        applicationId "com.mango.os.launcher"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0-Mango"
    }
}

dependencies {
    
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}